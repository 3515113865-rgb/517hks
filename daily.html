<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>当日测评</title>
    <style>
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Helvetica, Arial, "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei UI", "Microsoft YaHei", sans-serif;
      }

      body {
        background: var(--period-bg);
        color: var(--period-text);
      }

      .period-morning {
        --period-primary: #ff9d6e;
        --period-secondary: #ffe8d9;
        --period-bg: #fafafa;
        --period-text: #2a2a2a;
        --glass-bg: rgba(255, 255, 255, 0.72);
        --glass-border: rgba(17, 17, 17, 0.08);
        --shadow: 0 16px 46px rgba(0, 0, 0, 0.1);
      }

      .period-afternoon {
        --period-primary: #87ceeb;
        --period-secondary: #d4e8f0;
        --period-bg: #f5f9fc;
        --period-text: #2a2a2a;
        --glass-bg: rgba(255, 255, 255, 0.7);
        --glass-border: rgba(17, 17, 17, 0.08);
        --shadow: 0 16px 46px rgba(0, 0, 0, 0.1);
      }

      .period-evening {
        --period-primary: #9b8fc7;
        --period-secondary: #c5bfdb;
        --period-bg: #2a2634;
        --period-text: #e8e6f0;
        --glass-bg: rgba(255, 255, 255, 0.1);
        --glass-border: rgba(255, 255, 255, 0.14);
        --shadow: 0 18px 56px rgba(0, 0, 0, 0.42);
      }

      .period-midnight {
        --period-primary: #4a5f7f;
        --period-secondary: #5d6f8a;
        --period-bg: #0f1419;
        --period-text: #b8c5d6;
        --glass-bg: rgba(255, 255, 255, 0.09);
        --glass-border: rgba(255, 255, 255, 0.14);
        --shadow: 0 18px 66px rgba(0, 0, 0, 0.55);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button {
        font: inherit;
        color: inherit;
      }

      .app {
        min-height: 100%;
        max-width: 375px;
        margin: 0 auto;
        padding: 18px 16px calc(94px + env(safe-area-inset-bottom));
        position: relative;
      }

      .bg-atmo {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .bg-atmo::before,
      .bg-atmo::after {
        content: "";
        position: absolute;
        width: 520px;
        height: 520px;
        border-radius: 50%;
        filter: blur(44px);
        opacity: 0.52;
        background: radial-gradient(circle at 30% 30%, var(--period-primary), transparent 55%),
          radial-gradient(circle at 70% 70%, var(--period-secondary), transparent 55%);
      }

      .bg-atmo::before {
        top: -260px;
        left: -280px;
      }

      .bg-atmo::after {
        bottom: -320px;
        right: -320px;
        opacity: 0.36;
      }

      .header {
        position: relative;
        z-index: 1;
        margin-top: env(safe-area-inset-top);
      }

      .header-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 999px;
        border: 1px solid var(--glass-border);
        background: var(--glass-bg);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      .chip span {
        font-size: 12px;
        letter-spacing: 0.2px;
      }

      .back {
        height: 40px;
        padding: 0 12px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 14px;
        border: 1px solid var(--glass-border);
        background: var(--glass-bg);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
        user-select: none;
        font-size: 13px;
        font-weight: 620;
      }

      .back:active {
        transform: scale(0.98);
      }

      .back svg {
        width: 18px;
        height: 18px;
        flex: none;
      }

      .title {
        position: relative;
        z-index: 1;
        margin: 18px 0 0;
        font-size: 20px;
        letter-spacing: 0.2px;
      }

      .subtitle {
        position: relative;
        z-index: 1;
        margin: 8px 0 0;
        font-size: 13px;
        opacity: 0.74;
        line-height: 1.65;
      }

      .section {
        position: relative;
        z-index: 1;
        margin-top: 16px;
      }

      .glass {
        border-radius: 26px;
        border: 1px solid var(--glass-border);
        background: color-mix(in oklab, var(--glass-bg) 84%, transparent);
        backdrop-filter: blur(16px);
        box-shadow: var(--shadow);
      }

      .period-strip {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding: 2px 0 6px;
        scrollbar-width: none;
      }

      .period-strip::-webkit-scrollbar {
        display: none;
      }

      .period-btn {
        flex: none;
        height: 38px;
        padding: 0 14px;
        border-radius: 999px;
        border: 1px solid var(--glass-border);
        background: rgba(255, 255, 255, 0.1);
        cursor: pointer;
        user-select: none;
        font-size: 12px;
        letter-spacing: 0.2px;
        white-space: nowrap;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .period-btn.active {
        background: var(--period-primary);
        color: var(--period-bg);
        border-color: color-mix(in oklab, var(--period-primary) 70%, var(--glass-border));
        font-weight: 700;
      }

      .assessment {
        padding: 18px 18px 16px;
      }

      .badge-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 10px;
        border-radius: 999px;
        border: 1px solid var(--glass-border);
        background: rgba(255, 255, 255, 0.14);
        font-size: 12px;
        opacity: 0.92;
      }

      .assessment .card-img {
        width: 120px;
        height: 120px;
        display: none;
        object-fit: cover;
        object-position: center;
        border-radius: 18px;
        margin: 12px auto 2px;
        border: 1px solid var(--glass-border);
        background: rgba(255, 255, 255, 0.10);
        box-shadow: var(--shadow);
      }

      .assessment h2 {
        margin: 12px 0 6px;
        font-size: 18px;
        letter-spacing: 0.2px;
      }

      .assessment .insight {
        margin: 0 0 12px;
        font-size: 13px;
        opacity: 0.9;
        line-height: 1.65;
      }

      .detail {
        border-radius: 20px;
        border: 1px solid var(--glass-border);
        background: rgba(255, 255, 255, 0.12);
        padding: 14px 14px;
      }

      .detail p {
        margin: 0;
        font-size: 13px;
        opacity: 0.9;
        line-height: 1.75;
      }

      .tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .tag {
        font-size: 12px;
        padding: 7px 10px;
        border-radius: 999px;
        border: 1px solid var(--glass-border);
        background: rgba(255, 255, 255, 0.14);
        opacity: 0.92;
        letter-spacing: 0.1px;
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin: 0 0 10px;
      }

      .section-head h3 {
        margin: 0;
        font-size: 15px;
        letter-spacing: 0.2px;
      }

      .chart-card {
        padding: 18px 16px 16px;
      }

      .chart {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 2px;
        height: 132px;
      }

      .bar {
        flex: 1;
        border-radius: 6px 6px 2px 2px;
        background: var(--period-primary);
        opacity: 0.6;
        height: 0%;
        transition: height 260ms ease;
      }

      .axis {
        display: flex;
        justify-content: space-between;
        margin-top: 10px;
        font-size: 11px;
        opacity: 0.62;
        letter-spacing: 0.2px;
      }

      .note {
        margin: 12px 0 0;
        font-size: 11px;
        opacity: 0.6;
        text-align: center;
        line-height: 1.6;
      }

      .bottom {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
        display: grid;
        place-items: center;
        pointer-events: auto;
        z-index: 30;
      }

      .bottom-inner {
        width: min(375px, calc(100% - 20px));
        pointer-events: auto;
        border-radius: 18px;
        border: 1px solid var(--glass-border);
        background: color-mix(in oklab, var(--glass-bg) 88%, transparent);
        backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 8px;
      }

      .nav-back {
        height: 40px;
        border-radius: 14px;
        border: 1px solid var(--glass-border);
        background: color-mix(in oklab, var(--glass-bg) 85%, transparent);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
        font-size: 12px;
        font-weight: 680;
        user-select: none;
        white-space: nowrap;
      }

      .nav-back:active {
        transform: scale(0.98);
      }

      .nav-back svg {
        width: 18px;
        height: 18px;
      }

      .tabs {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 6px;
        flex: 1;
        min-width: 0;
      }

      .tab {
        height: 40px;
        padding: 0 10px;
        border-radius: 14px;
        border: 1px solid var(--glass-border);
        background: color-mix(in oklab, var(--glass-bg) 85%, transparent);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        opacity: 0.9;
        user-select: none;
        min-width: 0;
        touch-action: manipulation;
        cursor: pointer;
      }

      .tab svg {
        width: 16px;
        height: 16px;
        flex: none;
      }

      .tab span {
        display: inline-block;
        max-width: 72px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .tab.active {
        background: var(--period-primary);
        border-color: color-mix(in oklab, var(--period-primary) 70%, var(--glass-border));
        color: var(--period-bg);
        opacity: 1;
        font-weight: 700;
      }

      .fade {
        opacity: 0;
        transform: translateY(10px);
        animation: appear 720ms cubic-bezier(0.2, 0.9, 0.2, 1) forwards;
      }

      @keyframes appear {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <main class="app" id="app">
      <div class="bg-atmo" aria-hidden="true"></div>

      <header class="header">
        <div class="header-top fade" style="animation-delay: 20ms">
          <div class="chip" aria-label="测评时段">
            <span id="periodLabel">—</span>
            <span style="opacity: 0.62">·</span>
            <span id="periodTime">--:--</span>
            <span style="opacity: 0.62">·</span>
            <span id="userIdText">ID：未设置</span>
          </div>
          <a class="back" href="./index.html" aria-label="返回到首页">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M15.25 5.75 8.75 12l6.5 6.25"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            返回
          </a>
        </div>

        <h1 class="title fade" style="animation-delay: 90ms">当日测评</h1>
        <p class="subtitle fade" style="animation-delay: 140ms">基于你今天在每个时段的观察行为定向</p>
      </header>

      <section class="section fade" style="animation-delay: 200ms" aria-label="时段切换">
        <div class="period-strip" id="periodStrip"></div>
      </section>

      <section class="section fade" style="animation-delay: 290ms" aria-label="时段测评">
        <div class="glass assessment">
          <div class="badge-pill" id="periodBadge">—</div>
          <img class="card-img" id="cardImg" alt="" />
          <h2 id="cardTitle">—</h2>
          <p class="insight" id="cardInsight">—</p>
          <div class="detail">
            <p id="cardDetail">—</p>
          </div>
          <div class="tag-row" id="tagRow"></div>
        </div>
      </section>

      <section class="section fade" style="animation-delay: 380ms" aria-label="今日节奏">
        <div class="section-head">
          <h3>今日节奏</h3>
        </div>
        <div class="glass chart-card">
          <div class="chart" id="chartBars" aria-hidden="true"></div>
          <div class="axis" aria-hidden="true">
            <span>00</span>
            <span>06</span>
            <span>12</span>
            <span>18</span>
            <span>24</span>
          </div>
          <p class="note">↑节奏数据基于刷30min / 停留5min+ / 内容标签合格率（业务预研）</p>
        </div>
      </section>
    </main>

    <nav class="bottom" aria-label="底部标签栏">
      <div class="bottom-inner">
        <a class="nav-back" href="./index.html" aria-label="返回到首页">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M15.25 5.75 8.75 12l6.5 6.25"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          返回
        </a>

        <div class="tabs" role="tablist" aria-label="页面切换">
          <a class="tab" role="tab" aria-label="此刻的你" href="./current.html" data-page="current">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M12 2l1.6 4.7 4.9.1-3.9 2.9 1.5 4.8-4.1-2.7-4.1 2.7 1.5-4.8-3.9-2.9 4.9-.1L12 2Z"
                stroke="currentColor"
                stroke-width="1.7"
                stroke-linejoin="round"
                opacity="0.92"
              />
            </svg>
            <span>此刻的你</span>
          </a>
          <a class="tab active" role="tab" aria-label="当日测评" href="./daily.html" data-page="daily">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M8 3v3M16 3v3"
                stroke="currentColor"
                stroke-width="1.7"
                stroke-linecap="round"
              />
              <path
                d="M5 6h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2Z"
                stroke="currentColor"
                stroke-width="1.7"
                opacity="0.9"
              />
              <path
                d="M7 11h10M7 15h7"
                stroke="currentColor"
                stroke-width="1.7"
                stroke-linecap="round"
                opacity="0.65"
              />
            </svg>
            <span>当日测评</span>
          </a>
          <a class="tab" role="tab" aria-label="时间轴" href="./timeline.html" data-page="timeline">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M12 2a9.5 9.5 0 1 0 9.5 9.5"
                stroke="currentColor"

                stroke-linecap="round"
                opacity="0.9"
              />
              <path
                d="M12 6.5v6l4 2.3"

                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M18.6 5.4 22 5v3.4"
                stroke="currentColor"
                stroke-width="1.7"
                stroke-linecap="round"
                stroke-linejoin="round"
                opacity="0.7"
              />
            </svg>
            <span>时间轴</span>
          </a>
        </div>
      </div>
    </nav>

    <script>
      (function () {
        var PERIODS = {
          morning: { label: "人类重启区", range: "06:00-11:00", className: "period-morning" },
          afternoon: { label: "精神下班区", range: "12:00-18:00", className: "period-afternoon" },
          evening: { label: "终于轮到我了区", range: "19:00-24:00", className: "period-evening" },
          midnight: { label: "真实面暴露区", range: "00:00-04:00", className: "period-midnight" },
        };

        var PERIOD_UI = [
          { period: "morning", label: "晨间", time: "06:00-11:00" },
          { period: "afternoon", label: "午后", time: "12:00-18:00" },
          { period: "evening", label: "夜晚", time: "19:00-24:00" },
          { period: "midnight", label: "凌晨", time: "00:00-04:00" },
        ];

        var CONTENT = {
          morning: {
            title: "五分钟改变人生者",
            insight: "一时上头想立刻蜕变",
            detail:
              "晨间的你正处于「人类重启区」，这是从私人空间向公共空间过渡的缓冲时段。你的身体已经醒来，但心理状态还停留在半梦半醒之间——这种错位感是完全正常的生理现象。此刻的你像一台正在预热的机器，系统正在逐步加载运行。不要急于进入高强度工作，你需要给大脑和情绪系统一个适应的过程。",
            tags: ["#上头", "#逆袭", "#热启动", "#冲刺"],
          },
          afternoon: {
            title: "工位灵魂出窍者",
            insight: "身体在岗，灵魂早已出走",
            detail:
              "午后的你进入了「精神下班区」，这是一天中最容易被误解的时段。你会发现注意力开始分散，思维变得迟缓，甚至产生一种「我怎么什么都做不好」的自我怀疑——但这并非你能力的问题，而是正常的生理节律。此刻的你就像手机电量从80%滑落到40%的过程，不是坏了，只是需要充电。",
            tags: ["#能量低", "#摸鱼", "#放空", "#充电"],
          },
          evening: {
            title: "白天装正常的人",
            insight: "到了晚上才做真实的自己",
            detail:
              "夜晚的你进入了「终于轮到我了区」，这是一天中最接近真实自我的时刻。白天为了适应社会角色而压抑的情绪，此刻开始慢慢浮现——可能是委屈、疲惫，也可能是被忽略的渴望。这些情绪不是突然产生的，只是白天没有空间让它们被看见。",
            tags: ["#真实", "#释放", "#回归", "#自我"],
          },
          midnight: {
            title: "emo潜水艇",
            insight: "深夜陷入安静细腻情绪",
            detail:
              "凌晨的你处于「真实面暴露区」，这是一天中最赤裸也最脆弱的时刻。所有白天精心维系的平衡感在此刻瓦解，你会发现自己对情绪的控制力大幅下降——小事会被放大，负面想法会像潮水一样涌来。但请记住：深夜会扭曲你的视角。",
            tags: ["#情绪", "#脆弱", "#真实", "#深夜"],
          },
        };

        var STORAGE_ACTIVE_USER = "dy_active_user_v1";
        var BASE_PERSONA = "dy_persona_v1";

        function loadJSON(key, fallback) {
          try {
            var raw = localStorage.getItem(key);
            if (!raw) return fallback;
            return JSON.parse(raw);
          } catch (e) {
            return fallback;
          }
        }

        function loadActiveUserId() {
          var obj = loadJSON(STORAGE_ACTIVE_USER, null);
          return obj && obj.userId ? String(obj.userId) : "";
        }

        function personaStoreKeyForUser(userId) {
          return userId ? BASE_PERSONA + "::" + userId : BASE_PERSONA;
        }

        function setUserIdChip(userId) {
          var node = el("userIdText");
          if (!node) return;
          node.textContent = userId ? "ID：" + userId : "ID：未设置";
        }

        function latestForPeriod(period, userId) {
          var store = loadJSON(personaStoreKeyForUser(userId), null);
          var history = store && store.history;
          if (!Array.isArray(history)) return null;
          for (var i = 0; i < history.length; i++) {
            var it = history[i];
            if (it && it.periodKey === period && it.persona) return it;
          }
          return null;
        }

        function getPeriodByHour(hour) {
          if (hour >= 6 && hour < 12) return "morning";
          if (hour >= 12 && hour < 19) return "afternoon";
          if (hour >= 19 && hour < 24) return "evening";
          return "midnight";
        }

        function el(id) {
          return document.getElementById(id);
        }

        function setText(id, text) {
          var node = el(id);
          if (node) node.textContent = text;
        }

        function escapeHTML(s) {
          return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
        }

        function buildPeriodStrip() {
          var strip = el("periodStrip");
          if (!strip) return;

          strip.innerHTML = PERIOD_UI
            .map(function (p) {
              return (
                '<button class="period-btn" type="button" data-period="' +
                p.period +
                '" aria-label="' +
                escapeHTML(p.label) +
                '">' +
                escapeHTML(p.label) +
                "</button>"
              );
            })
            .join("");

          strip.addEventListener("click", function (e) {
            var t = e.target;
            while (t && t !== strip && !(t instanceof HTMLButtonElement)) t = t.parentNode;
            if (!t || t === strip) return;
            var period = t.getAttribute("data-period");
            if (!period) return;
            render(period);
          });
        }

        function chartValue(hour, period) {
          var base = 38;
          var wave = 20 * Math.sin((hour / 24) * Math.PI * 2 - Math.PI / 2);
          var bias =
            period === "morning" ? 6 :
            period === "afternoon" ? -2 :
            period === "evening" ? 8 : -6;
          var local =
            period === "morning" ? (hour >= 6 && hour <= 11 ? 14 : -6) :
            period === "afternoon" ? (hour >= 12 && hour <= 18 ? 14 : -8) :
            period === "evening" ? (hour >= 19 && hour <= 23 ? 18 : -10) :
            hour >= 0 && hour <= 4 ? 16 : -10;
          var v = base + wave + bias + local;
          if (v < 12) v = 12;
          if (v > 92) v = 92;
          return v;
        }

        function renderChart(period) {
          var wrap = el("chartBars");
          if (!wrap) return;

          if (!wrap.firstChild) {
            var bars = [];
            for (var i = 0; i < 24; i++) bars.push('<div class="bar" data-hour="' + i + '"></div>');
            wrap.innerHTML = bars.join("");
          }

          var nodes = wrap.querySelectorAll(".bar[data-hour]");
          requestAnimationFrame(function () {
            for (var i = 0; i < nodes.length; i++) {
              var n = nodes[i];
              var h = Number(n.getAttribute("data-hour") || "0");
              n.style.height = String(chartValue(h, period)) + "%";
            }
          });
        }

        function setSelectedButton(period) {
          var btns = document.querySelectorAll(".period-btn[data-period]");
          for (var i = 0; i < btns.length; i++) {
            var b = btns[i];
            b.classList.toggle("active", b.getAttribute("data-period") === period);
          }
        }

        function highlightTabs() {
          var file = (location.pathname.split("/").pop() || "").toLowerCase();
          var map = { "current.html": "current", "daily.html": "daily", "timeline.html": "timeline" };
          var active = map[file] || "daily";

          var tabs = document.querySelectorAll(".tab[data-page]");
          for (var i = 0; i < tabs.length; i++) {
            var t = tabs[i];
            t.classList.toggle("active", t.getAttribute("data-page") === active);
          }
        }

        function render(period) {
          var info = PERIODS[period] || PERIODS.morning;
          var content = CONTENT[period] || CONTENT.morning;
          var userId = loadActiveUserId();
          setUserIdChip(userId);
          var result = latestForPeriod(period, userId);
          var hasPersona = !!(result && result.persona);
          var title = hasPersona ? result.persona.title : content.title;
          var insight = hasPersona ? result.persona.insight : content.insight;
          var detail = hasPersona ? result.persona.desc : content.detail;
          var badgeLabel = hasPersona && result.periodLabel ? result.periodLabel : info.label;
          var badgeRange = hasPersona && result.periodRange ? result.periodRange : info.range;

          document.body.className = info.className;
          setText("periodLabel", badgeLabel);
          setText("periodTime", badgeRange);
          setText("periodBadge", badgeLabel + " " + badgeRange);

          setText("cardTitle", title);
          setText("cardInsight", insight);
          setText("cardDetail", detail);

          var img = el("cardImg");
          if (img) {
            img.style.display = "none";
            img.onload = function () {
              img.style.display = "block";
            };
            img.onerror = function () {
              img.style.display = "none";
            };
            img.alt = title;
            img.src = encodeURI(hasPersona && result.personaImage ? result.personaImage : "./src/imports/" + title + ".png");
          }

          var tagRow = el("tagRow");
          if (tagRow) {
            tagRow.innerHTML = content.tags
              .map(function (t) {
                return '<span class="tag">' + escapeHTML(t) + "</span>";
              })
              .join("");
          }

          setSelectedButton(period);
          renderChart(period);
        }

        buildPeriodStrip();
        highlightTabs();
        render(getPeriodByHour(new Date().getHours()));
      })();
    </script>
  </body>
</html>
