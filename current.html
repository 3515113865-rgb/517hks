<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>此刻的你</title>
    <style>
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Helvetica, Arial, "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei UI", "Microsoft YaHei", sans-serif;
      }

      body {
        background: var(--period-bg);
        color: var(--period-text);
      }

      .period-morning {
        --period-primary: #ff9d6e;
        --period-secondary: #ffe8d9;
        --period-bg: #fafafa;
        --period-text: #2a2a2a;
        --period-gradient-from: #ffb88c;
        --period-gradient-to: #ffe8d9;
        --glass-bg: rgba(255, 255, 255, 0.72);
        --glass-border: rgba(17, 17, 17, 0.08);
        --shadow: 0 16px 46px rgba(0, 0, 0, 0.10);
      }

      .period-afternoon {
        --period-primary: #87ceeb;
        --period-secondary: #d4e8f0;
        --period-bg: #f5f9fc;
        --period-text: #2a2a2a;
        --period-gradient-from: #a0d8ef;
        --period-gradient-to: #e5f3f9;
        --glass-bg: rgba(255, 255, 255, 0.70);
        --glass-border: rgba(17, 17, 17, 0.08);
        --shadow: 0 16px 46px rgba(0, 0, 0, 0.10);
      }

      .period-evening {
        --period-primary: #9b8fc7;
        --period-secondary: #c5bfdb;
        --period-bg: #2a2634;
        --period-text: #e8e6f0;
        --period-gradient-from: #8b7eb8;
        --period-gradient-to: #4a3f5c;
        --glass-bg: rgba(255, 255, 255, 0.10);
        --glass-border: rgba(255, 255, 255, 0.14);
        --shadow: 0 18px 56px rgba(0, 0, 0, 0.42);
      }

      .period-midnight {
        --period-primary: #4a5f7f;
        --period-secondary: #5d6f8a;
        --period-bg: #0f1419;
        --period-text: #b8c5d6;
        --period-gradient-from: #3a4d6b;
        --period-gradient-to: #1a2332;
        --glass-bg: rgba(255, 255, 255, 0.09);
        --glass-border: rgba(255, 255, 255, 0.14);
        --shadow: 0 18px 66px rgba(0, 0, 0, 0.55);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .app {
        min-height: 100%;
        max-width: 375px;
        margin: 0 auto;
        padding: 18px 16px calc(94px + env(safe-area-inset-bottom));
        position: relative;
      }

      .bg-atmo {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .bg-atmo::before,
      .bg-atmo::after {
        content: "";
        position: absolute;
        width: 520px;
        height: 520px;
        border-radius: 50%;
        filter: blur(40px);
        opacity: 0.55;
        background: radial-gradient(circle at 30% 30%, var(--period-primary), transparent 55%),
          radial-gradient(circle at 70% 70%, var(--period-secondary), transparent 55%);
      }

      .bg-atmo::before {
        top: -240px;
        left: -260px;
      }

      .bg-atmo::after {
        bottom: -300px;
        right: -280px;
        opacity: 0.40;
      }

      .header {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-top: env(safe-area-inset-top);
        margin-bottom: 16px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 999px;
        border: 1px solid var(--glass-border);
        background: var(--glass-bg);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      .chip span {
        font-size: 12px;
        letter-spacing: 0.2px;
      }

      .back {
        height: 40px;
        padding: 0 12px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 14px;
        border: 1px solid var(--glass-border);
        background: var(--glass-bg);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
        user-select: none;
        font-size: 13px;
        font-weight: 620;
      }

      .back:active {
        transform: scale(0.98);
      }

      .back svg {
        width: 18px;
        height: 18px;
        flex: none;
      }

      .title {
        position: relative;
        z-index: 1;
        margin: 10px 0 0;
        font-size: 20px;
        letter-spacing: 0.2px;
      }

      .subtitle {
        position: relative;
        z-index: 1;
        margin: 8px 0 0;
        font-size: 13px;
        opacity: 0.74;
        line-height: 1.65;
      }

      .section {
        position: relative;
        z-index: 1;
        margin-top: 14px;
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin: 0 0 10px;
      }

      .section-head h3 {
        margin: 0;
        font-size: 15px;
        letter-spacing: 0.2px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .section-head h3 svg {
        width: 18px;
        height: 18px;
        flex: none;
        opacity: 0.9;
      }

      .section-meta {
        font-size: 11px;
        opacity: 0.60;
        white-space: nowrap;
      }

      .glass {
        border-radius: 24px;
        border: 1px solid var(--glass-border);
        background: var(--glass-bg);
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
      }

      .hero {
        padding: 18px 18px 16px;
        border-radius: 26px;
        color: var(--period-text);
        background: linear-gradient(135deg, var(--period-gradient-from), var(--period-gradient-to));
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.14);
        overflow: hidden;
        position: relative;
      }

      .hero::before {
        content: "";
        position: absolute;
        inset: -2px;
        background: radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.38), transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.20), transparent 55%);
        opacity: 0.9;
        pointer-events: none;
      }

      .hero-inner {
        position: relative;
        z-index: 1;
      }

      .hero-img {
        width: 120px;
        height: 120px;
        display: none;
        object-fit: cover;
        object-position: center;
        border-radius: 18px;
        margin: 8px auto 12px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        background: rgba(255, 255, 255, 0.12);
        box-shadow: 0 14px 42px rgba(0, 0, 0, 0.18);
      }

      .hero-icon {
        width: 88px;
        height: 88px;
        border-radius: 999px;
        margin: 4px auto 12px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.26);
        background: rgba(255, 255, 255, 0.22);
        backdrop-filter: blur(10px);
      }

      .hero-icon svg {
        width: 40px;
        height: 40px;
        opacity: 0.95;
      }

      .hero-desc {
        margin: 0;
        font-size: 13px;
        opacity: 0.92;
        text-align: center;
        line-height: 1.65;
      }

      .grid-3 {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        padding: 16px;
      }

      .progress {
        display: grid;
        place-items: center;
        gap: 8px;
      }

      .progress svg {
        width: 64px;
        height: 64px;
        overflow: visible;
      }

      .progress .track {
        stroke: rgba(0, 0, 0, 0.10);
      }

      .period-evening .progress .track,
      .period-midnight .progress .track {
        stroke: rgba(255, 255, 255, 0.14);
      }

      .progress .bar {
        stroke: var(--period-primary);
        stroke-linecap: round;
        transform: rotate(-90deg);
        transform-origin: 50% 50%;
        transition: stroke-dashoffset 900ms cubic-bezier(0.2, 0.9, 0.15, 1);
      }

      .progress .val {
        font-size: 15px;
        font-weight: 760;
        letter-spacing: 0.2px;
      }

      .progress .lab {
        font-size: 11px;
        opacity: 0.72;
        letter-spacing: 0.2px;
      }

      .grid-4 {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        padding: 16px;
      }

      .pref {
        display: grid;
        place-items: center;
        gap: 7px;
        text-align: center;
      }

      .pref .bubble {
        width: 44px;
        height: 44px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        font-size: 18px;
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.12);
      }

      .pref .lab {
        font-size: 11px;
        opacity: 0.72;
      }

      .pref .val {
        font-size: 13px;
        font-weight: 720;
      }

      .copy {
        padding: 16px;
      }

      .copy p {
        margin: 0;
        font-size: 13px;
        opacity: 0.92;
        line-height: 1.72;
      }

      .copy p + p {
        margin-top: 10px;
      }

      .tips {
        padding: 14px 16px;
        display: grid;
        gap: 10px;
      }

      .tip {
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        margin-top: 6px;
        background: var(--period-primary);
        flex: none;
      }

      .tip span {
        font-size: 13px;
        line-height: 1.6;
        opacity: 0.92;
      }

      .rec-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .rec {
        padding: 14px 12px;
        border-radius: 18px;
        border: 1px solid var(--glass-border);
        background: var(--glass-bg);
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
        display: grid;
        place-items: center;
        gap: 8px;
        text-align: center;
        user-select: none;
      }

      .rec:active {
        transform: scale(0.98);
      }

      .rec .emo {
        font-size: 28px;
        line-height: 1;
      }

      .rec .t {
        font-size: 13px;
        font-weight: 720;
        letter-spacing: 0.2px;
      }

      .rec .d {
        font-size: 11px;
        opacity: 0.72;
      }

      .bottom {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
        display: grid;
        place-items: center;
        pointer-events: auto;
        z-index: 30;
      }

      .bottom-inner {
        width: min(375px, calc(100% - 20px));
        pointer-events: auto;
        border-radius: 18px;
        border: 1px solid var(--glass-border);
        background: color-mix(in oklab, var(--glass-bg) 88%, transparent);
        backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 8px;
      }

      .btn {
        height: 40px;
        border-radius: 14px;
        border: 1px solid var(--glass-border);
        background: color-mix(in oklab, var(--glass-bg) 85%, transparent);
        color: inherit;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
        font-size: 12px;
        font-weight: 650;
        user-select: none;
      }

      .btn:active {
        transform: scale(0.98);
      }

      .btn svg {
        width: 18px;
        height: 18px;
      }

      .tabs {
        display: flex;
        gap: 6px;
        flex: 1;
        justify-content: flex-end;
        min-width: 0;
      }

      .tab {
        height: 40px;
        border-radius: 14px;
        border: 1px solid var(--glass-border);
        background: color-mix(in oklab, var(--glass-bg) 85%, transparent);
        color: inherit;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 0 10px;
        font-size: 12px;
        font-weight: 650;
        user-select: none;
        white-space: nowrap;
        touch-action: manipulation;
        cursor: pointer;
      }

      .tab:active {
        transform: scale(0.98);
      }

      .tab svg {
        width: 18px;
        height: 18px;
        flex: none;
      }

      .tab.active {
        background: var(--period-primary);
        border-color: color-mix(in oklab, var(--period-primary) 70%, var(--glass-border));
        color: var(--period-bg);
      }

      .tab.active svg {
        stroke: currentColor;
      }

      .badge {
        height: 40px;
        padding: 0 12px;
        border-radius: 14px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(0, 0, 0, 0.08);
        color: rgba(0, 0, 0, 0.78);
        border: 1px solid rgba(0, 0, 0, 0.10);
        font-size: 12px;
        font-weight: 680;
        letter-spacing: 0.2px;
      }

      .period-evening .badge,
      .period-midnight .badge {
        background: rgba(255, 255, 255, 0.10);
        color: rgba(255, 255, 255, 0.84);
        border-color: rgba(255, 255, 255, 0.14);
      }

      .fade {
        opacity: 0;
        transform: translateY(10px);
        animation: appear 720ms cubic-bezier(0.2, 0.9, 0.2, 1) forwards;
      }

      @keyframes appear {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <main class="app" id="app">
      <div class="bg-atmo" aria-hidden="true"></div>

      <div class="header fade" style="animation-delay: 20ms">
        <div class="chip" aria-label="时间段信息">
          <span id="periodLabel">此刻</span>
          <span style="opacity: 0.62">·</span>
          <span id="periodTime">--:--</span>
        </div>
        <a class="back" href="./index.html" aria-label="返回到首页">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M15.25 5.75 8.75 12l6.5 6.25"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          返回
        </a>
      </div>

      <h1 class="title fade" id="cardTitle" style="animation-delay: 90ms">—</h1>
      <p class="subtitle fade" id="cardInsight" style="animation-delay: 140ms">—</p>

      <section class="section fade" style="animation-delay: 200ms">
        <div class="hero" role="group" aria-label="当下人格卡片">
          <div class="hero-inner">
            <img class="hero-img" id="cardImg" alt="" />
            <div class="hero-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path
                  d="M12 2c1.8 2.1 2.7 4 2.7 6.2 0 3-2.1 5.1-4.7 5.1S5.3 11.2 5.3 8.2C5.3 6 6.2 4.1 8 2"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  opacity="0.9"
                />
                <path
                  d="M7.2 13.6c-1.7 1.4-2.7 3.3-2.7 5.5h15c0-2.2-1-4.1-2.7-5.5"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  opacity="0.9"
                />
                <path
                  d="M12 12.6c1.6 0 2.9-.5 3.8-1.5"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  opacity="0.55"
                />
              </svg>
            </div>
            <p class="hero-desc" id="cardDesc">—</p>
          </div>
        </div>
      </section>

      <section class="section fade" style="animation-delay: 290ms">
        <div class="section-head">
          <h3>
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M4 17.5V20h16v-2.5"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
              <path
                d="M6.5 16 10 11.8l3 2.7L17.6 8"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M17.5 8h-2.2"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
            </svg>
            人格画像
          </h3>
          <div class="section-meta">实时数据</div>
        </div>
        <div class="glass">
          <div class="grid-3" id="traits"></div>
        </div>
      </section>

      <section class="section fade" style="animation-delay: 380ms">
        <div class="section-head">
          <h3>
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M12 2v3"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
              <path
                d="M4.2 7.2 6.3 9.3"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
              <path
                d="M2 15h3"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
              <path
                d="M18 15h4"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
              <path
                d="M18.7 9.3 20.8 7.2"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
              <path
                d="M12 7a8 8 0 1 0 0 16 8 8 0 0 0 0-16Z"
                stroke="currentColor"
                stroke-width="1.8"
                opacity="0.35"
              />
              <path
                d="M12 11v5l3 1.6"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            行为偏好
          </h3>
        </div>
        <div class="glass">
          <div class="grid-4" id="prefs"></div>
        </div>
      </section>

      <section class="section fade" style="animation-delay: 470ms">
        <div class="section-head">
          <h3>
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M12 2l2.1 6.4H21l-5.6 4.1L17.5 19 12 14.9 6.5 19l2.1-6.5L3 8.4h6.9L12 2Z"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linejoin="round"
              />
            </svg>
            人格解读
          </h3>
        </div>
        <div class="glass copy" id="persona"></div>
      </section>

      <section class="section fade" style="animation-delay: 560ms">
        <div class="section-head">
          <h3>
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M12 21s-7-4.4-9.4-9.2C1.3 8.1 3.2 5 6.6 5c1.8 0 3.2 1 3.9 2 0.7-1 2.1-2 3.9-2 3.4 0 5.3 3.1 4 6.8C19 16.6 12 21 12 21Z"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linejoin="round"
              />
            </svg>
            情感解读
          </h3>
        </div>
        <div class="glass copy" id="emotion"></div>
      </section>

      <section class="section fade" style="animation-delay: 650ms">
        <div class="section-head">
          <h3>
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M12 21c5.2 0 9.5-4.3 9.5-9.5S17.2 2 12 2 2.5 6.3 2.5 11.5 6.8 21 12 21Z"
                stroke="currentColor"
                stroke-width="1.6"
              />
              <path
                d="M8.4 12.2 10.8 14.6 15.8 9.6"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            今日建议
          </h3>
        </div>
        <div class="glass tips" id="tips"></div>
      </section>

      <section class="section fade" style="animation-delay: 740ms">
        <div class="section-head">
          <h3>
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M7 4h10a2 2 0 0 1 2 2v14l-5-3-5 3-5-3V6a2 2 0 0 1 2-2Z"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linejoin="round"
              />
              <path
                d="M9 8h6"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linecap="round"
                opacity="0.6"
              />
              <path
                d="M9 11h6"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linecap="round"
                opacity="0.6"
              />
            </svg>
            内容推荐
          </h3>
        </div>
        <div class="rec-grid" id="recs"></div>
      </section>
    </main>

    <nav class="bottom" aria-label="底部标签栏">
      <div class="bottom-inner">
        <a class="btn" href="./index.html" aria-label="返回到首页">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M15.25 5.75 8.75 12l6.5 6.25"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          返回
        </a>
        <nav class="tabs" aria-label="底部导航">
          <a class="tab" id="tabCurrent" href="./current.html" aria-label="此刻的你">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M12 2c1.8 2.1 2.7 4 2.7 6.2 0 3-2.1 5.1-4.7 5.1S5.3 11.2 5.3 8.2C5.3 6 6.2 4.1 8 2"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
                opacity="0.9"
              />

        var STORAGE_PERSONA = "dy_persona_v1";

        function loadJSON(key, fallback) {
          try {
            var raw = localStorage.getItem(key);
            if (!raw) return fallback;
            return JSON.parse(raw);
          } catch (e) {
            return fallback;
          }
        }

        function getPeriodByHour(hour) {
          if (hour >= 6 && hour < 12) return "morning";
          if (hour >= 12 && hour < 19) return "afternoon";
          if (hour >= 19 && hour < 24) return "evening";
          return "midnight";
        }

        function pad2(n) {
          return String(n).padStart(2, "0");
        }

        function formatClock(d) {
          return pad2(d.getHours()) + ":" + pad2(d.getMinutes());
        }

        function el(id) {
          return document.getElementById(id);
        }

        function setText(id, text) {
          var node = el(id);
          if (node) node.textContent = text;
        }

        function setHTML(id, html) {
          var node = el(id);
          if (node) node.innerHTML = html;
        }

        function renderProgressItem(item, idx) {
          var size = 64;
          var stroke = 7;
          var r = (size - stroke) / 2;
          var c = 2 * Math.PI * r;

          return (
            '<div class="progress" style="animation-delay:' +
            (420 + idx * 80) +
            'ms">' +
            '<svg viewBox="0 0 ' +
            size +
            " " +
            size +
            '" aria-label="' +
            item.label +
            " " +
            item.value +
            '%">' +
            '<circle class="track" cx="' +
            size / 2 +
            '" cy="' +
            size / 2 +
            '" r="' +
            r +
            '" stroke-width="' +
            stroke +
            '" fill="none" />' +
            '<circle class="bar" data-c="' +
            c +
            '" data-v="' +
            item.value +
            '" cx="' +
            size / 2 +
            '" cy="' +
            size / 2 +
            '" r="' +
            r +
            '" stroke-width="' +
            stroke +
            '" fill="none" stroke-dasharray="' +
            c +
            '" stroke-dashoffset="' +
            c +
            '" />' +
            "</svg>" +
            '<div class="val">' +
            item.value +
            "%</div>" +
            '<div class="lab">' +
            item.label +
            "</div>" +
            "</div>"
          );
        }

        function renderPrefItem(item) {
          return (
            '<div class="pref">' +
            '<div class="bubble" style="background:' +
            item.color +
            '">' +
            item.icon +
            "</div>" +
            '<div class="lab">' +
            item.label +
            "</div>" +
            '<div class="val">' +
            item.value +
            "%</div>" +
            "</div>"
          );
        }

        function applyProgress() {
          var bars = document.querySelectorAll(".bar");
          requestAnimationFrame(function () {
            for (var i = 0; i < bars.length; i++) {
              var bar = bars[i];
              var c = Number(bar.getAttribute("data-c") || "0");
              var v = Number(bar.getAttribute("data-v") || "0");
              var offset = c * (1 - v / 100);
              bar.style.strokeDashoffset = String(offset);
            }
          });
        }

        function render(periodKey, result) {
          var info = PERIODS[periodKey] || PERIODS.morning;
          document.body.className = info.className;

          var hasPersona = !!(result && result.persona);
          var title = hasPersona ? result.persona.title : info.card.title;
          var insight = hasPersona ? result.persona.insight : info.card.insight;
          var desc = hasPersona ? result.persona.desc : info.card.description;
          var label = hasPersona && result.periodLabel ? result.periodLabel : info.label;
          var range = hasPersona && result.periodRange ? result.periodRange : info.range;

          setText("periodLabel", label);
          setText("periodTime", range);
          setText("cardTitle", title);
          setText("cardInsight", insight);
          setText("cardDesc", desc);

          var img = el("cardImg");
          var icon = document.querySelector(".hero-icon");
          if (img) {
            img.style.display = "none";
            img.onload = function () {
              img.style.display = "block";
              if (icon) icon.style.display = "none";
            };
            img.onerror = function () {
              img.style.display = "none";
              if (icon) icon.style.display = "grid";
            };
            img.alt = title;
            img.src = encodeURI(hasPersona && result.personaImage ? result.personaImage : "./src/imports/" + title + ".png");
          }

          setHTML(
            "traits",
            info.traits
              .map(function (t, idx) {
                return renderProgressItem(t, idx);
              })
              .join("")
          );

          setHTML(
            "prefs",
            info.prefs
              .map(function (p) {
                return renderPrefItem(p);
              })
              .join("")
          );

          setHTML(
            "persona",
            info.persona
              .map(function (p) {
                return "<p>" + p + "</p>";
              })
              .join("")
          );

          setHTML("emotion", "<p>" + info.emotion + "</p>");

          setHTML(
            "tips",
            info.tips
              .map(function (t) {
                return '<div class="tip"><div class="dot"></div><span>' + t + "</span></div>";
              })
              .join("")
          );

          setHTML(
            "recs",
            info.recs
              .map(function (r, idx) {
                return (
                  '<div class="rec fade" style="animation-delay:' +
                  (820 + idx * 70) +
                  'ms"><div class="emo">' +
                  r.icon +
                  '</div><div class="t">' +
                  r.title +
                  '</div><div class="d">' +
                  r.description +
                  "</div></div>"
                );
              })
              .join("")
          );

          applyProgress();
        }

        function setActiveTab() {
          var path = String(window.location.pathname || "");
          var name = path.split("/").pop() || "";
          var isCurrent = name === "" || name === "current.html";
          var isDaily = name === "daily.html";
          var isTimeline = name === "timeline.html";

          var tabCurrent = el("tabCurrent");
          var tabDaily = el("tabDaily");
          var tabTimeline = el("tabTimeline");

          if (tabCurrent) {
            tabCurrent.classList.toggle("active", isCurrent);
            if (isCurrent) tabCurrent.setAttribute("aria-current", "page");
            else tabCurrent.removeAttribute("aria-current");
          }
          if (tabDaily) {
            tabDaily.classList.toggle("active", isDaily);
            if (isDaily) tabDaily.setAttribute("aria-current", "page");
            else tabDaily.removeAttribute("aria-current");
          }
          if (tabTimeline) {
            tabTimeline.classList.toggle("active", isTimeline);
            if (isTimeline) tabTimeline.setAttribute("aria-current", "page");
            else tabTimeline.removeAttribute("aria-current");
          }
        }

        function refresh() {
          var now = new Date();
          var periodKey = getPeriodByHour(now.getHours());
          var store = loadJSON(STORAGE_PERSONA, null);
          var latest = store && store.latest;
          if (latest && latest.persona) render(latest.periodKey || periodKey, latest);
          else render(periodKey, null);
        }

        setActiveTab();
        refresh();
      })();
