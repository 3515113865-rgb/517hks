
<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>抖音短视频应用设计（静态版）</title>
    <style>
      :root {
        --bg: #000;
        --fg: #fff;
        --muted: rgba(255, 255, 255, 0.72);
        --muted2: rgba(255, 255, 255, 0.55);
        --glass: rgba(255, 255, 255, 0.18);
        --glass2: rgba(255, 255, 255, 0.12);
        --danger: #ff2d55;
        --warn: #ffcc00;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      }

      .wrap {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 12px;
      }

      .phone {
        width: 100%;
        max-width: 420px;
        height: min(860px, 100vh);
        background: #000;
        border-radius: 20px;
        overflow: hidden;
        position: relative;
      }

      .stage {
        position: absolute;
        inset: 0;
        overflow: hidden;
        background: #000;
      }

      video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        background: #000;
      }

      .shade {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0) 35%, rgba(0, 0, 0, 0.62) 100%);
        pointer-events: none;
      }

      .topbar {
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        padding: 14px 14px 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        z-index: 3;
      }

      .counter {
        font-size: 12px;
        color: var(--muted);
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.12);
        padding: 6px 10px;
        border-radius: 999px;
        backdrop-filter: blur(10px);
      }

      .top-right {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        max-width: 74%;
      }

      .persona-entry {
        width: 34px;
        height: 34px;
        padding: 0;
        display: grid;
        place-items: center;
        color: rgba(255, 255, 255, 0.92);
        background: rgba(0, 0, 0, 0.48);
        border-color: rgba(255, 255, 255, 0.18);
        text-decoration: none;
      }

      .persona-entry svg {
        width: 18px;
        height: 18px;
        opacity: 0.92;
      }

      .persona-entry.has {
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.24), 0 8px 16px rgba(0, 0, 0, 0.32);
      }

      .cover {
        position: absolute;
        inset: 0;
        z-index: 40;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 18px;
        background: radial-gradient(circle at 18% 12%, rgba(168, 85, 247, 0.38), transparent 50%),
          radial-gradient(circle at 86% 18%, rgba(236, 72, 153, 0.32), transparent 48%),
          radial-gradient(circle at 78% 82%, rgba(59, 130, 246, 0.22), transparent 52%),
          linear-gradient(180deg, rgba(0, 0, 0, 0.60), rgba(0, 0, 0, 0.78));
        backdrop-filter: blur(10px);
      }

      .cover.off {
        display: none;
      }

      .cover-card {
        width: min(360px, 100%);
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(20, 20, 20, 0.72);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
        padding: 16px 16px 14px;
        transform: translateY(0);
        animation: coverIn 520ms cubic-bezier(0.2, 0.9, 0.2, 1);
      }

      @keyframes coverIn {
        from {
          opacity: 0;
          transform: translateY(10px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .cover-title {
        margin: 0 0 8px;
        font-size: 16px;
        line-height: 1.25;
        font-weight: 750;
        letter-spacing: 0.2px;
      }

      .cover-sub {
        margin: 0 0 14px;
        font-size: 12px;
        line-height: 1.55;
        color: rgba(255, 255, 255, 0.76);
      }

      .cover-label {
        display: block;
        margin: 0 0 8px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.86);
        letter-spacing: 0.2px;
      }

      .cover-input {
        width: 100%;
        height: 44px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.92);
        padding: 0 12px;
        font-size: 14px;
        outline: none;
      }

      .cover-input:focus {
        border-color: rgba(255, 255, 255, 0.28);
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.06);
      }

      .cover-actions {
        display: flex;
        gap: 10px;
        margin-top: 12px;
      }

      .cover-btn {
        flex: 1;
        height: 42px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.9);
        font-size: 13px;
        cursor: pointer;
        user-select: none;
        backdrop-filter: blur(10px);
      }

      .cover-btn:active {
        transform: scale(0.98);
      }

      .cover-btn.primary {
        background: rgba(255, 255, 255, 0.16);
        border-color: rgba(255, 255, 255, 0.2);
        color: rgba(255, 255, 255, 0.96);
        font-weight: 700;
      }

      .cover-hint {
        margin-top: 10px;
        font-size: 11px;
        line-height: 1.5;
        color: rgba(255, 255, 255, 0.64);
      }

      .cover-tip {
        margin-top: 8px;
        font-size: 11px;
        line-height: 1.5;
        color: rgba(255, 204, 0, 0.92);
        min-height: 16px;
      }

      .hint {
        position: absolute;
        left: 50%;
        top: 48%;
        transform: translate(-50%, -50%);
        padding: 8px 10px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.14);
        color: var(--muted);
        font-size: 12px;
        z-index: 3;
        opacity: 0;
        transition: opacity 180ms ease;
      }

      .hint.on {
        opacity: 1;
      }

      .actions {
        position: absolute;
        right: 12px;
        bottom: 110px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        z-index: 3;
      }

      .btn {
        display: grid;
        place-items: center;
        width: 48px;
        height: 48px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: var(--glass);
        backdrop-filter: blur(10px);
        cursor: pointer;
        user-select: none;
      }

      .btn:active {
        transform: scale(0.95);
      }

      .btn svg {
        width: 22px;
        height: 22px;
        fill: none;
        stroke: #fff;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .btn.on {
        background: rgba(255, 255, 255, 0.22);
        border-color: rgba(255, 255, 255, 0.18);
      }

      .btn.like.on {
        background: rgba(255, 45, 85, 0.88);
        border-color: rgba(255, 255, 255, 0.18);
      }

      .btn.like.on svg {
        fill: #fff;
      }

      .btn.save.on {
        background: rgba(255, 204, 0, 0.85);
        border-color: rgba(255, 255, 255, 0.18);
      }

      .btn.save.on svg {
        fill: #fff;
        stroke: #fff;
      }

      .count {
        margin-top: 6px;
        font-size: 12px;
        color: #fff;
        text-align: center;
      }

      .meta {
        position: absolute;
        left: 12px;
        right: 90px;
        bottom: 18px;
        z-index: 3;
      }

      .user {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }

      .avatar {
        width: 38px;
        height: 38px;
        border-radius: 999px;
        background: radial-gradient(circle at 25% 25%, #a855f7 0%, #ec4899 45%, #fb7185 100%);
        border: 2px solid rgba(255, 255, 255, 0.9);
      }

      .handle {
        font-size: 14px;
        color: #fff;
      }

      .caption {
        font-size: 14px;
        line-height: 1.4;
        color: #fff;
        margin: 0 0 10px;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.92);
      }

      .tag {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        padding: 4px 8px;
        border-radius: 999px;
        backdrop-filter: blur(10px);
      }

      .footer {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 10px 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.7) 100%);
        z-index: 3;
      }

      .pill {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: rgba(255, 255, 255, 0.9);
        font-size: 12px;
        padding: 10px 12px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(10px);
      }

      .pill b {
        color: #fff;
        font-weight: 600;
        letter-spacing: 0.2px;
      }

      .modal {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 18px;
        z-index: 10;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(10px);
      }

      .modal.on {
        display: flex;
      }

      .modal-card {
        width: min(360px, 100%);
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(20, 20, 20, 0.72);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
        overflow: hidden;
      }

      .modal-head {
        padding: 16px 16px 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .modal-title {
        font-size: 14px;
        font-weight: 650;
        letter-spacing: 0.2px;
        color: inherit;
      }

      .modal-badge {
        font-size: 12px;
        color: inherit;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        padding: 6px 10px;
        border-radius: 999px;
      }

      .modal-body {
        padding: 0 16px 16px;
      }

      .modal-desc {
        margin: 0;
        color: inherit;
        font-size: 13px;
        line-height: 1.5;
        opacity: 0.82;
      }

      .modal-persona {
        margin-top: 12px;
        padding: 12px 12px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.08);
      }

      .modal-persona .kicker {
        font-size: 12px;
        color: inherit;
        margin-bottom: 6px;
        opacity: 0.86;
      }

      .modal-persona .pimg {
        width: 96px;
        height: 96px;
        display: none;
        object-fit: cover;
        object-position: center;
        border-radius: 16px;
        margin: 10px auto 10px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.06);
      }

      .modal-persona .ptitle {
        margin: 0 0 8px;
        font-size: 18px;
        line-height: 1.2;
        font-weight: 700;
        letter-spacing: 0.2px;
        color: inherit;
      }

      .modal-persona .pinsight {
        margin: 0 0 8px;
        font-size: 13px;
        color: inherit;
        line-height: 1.55;
        opacity: 0.9;
      }

      .modal-persona .pdesc {
        margin: 0;
        font-size: 12px;
        color: inherit;
        line-height: 1.55;
        opacity: 0.76;
      }

      .modal-actions {
        display: flex;
        gap: 10px;
        padding: 14px 16px 16px;
        border-top: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
      }

      .modal-btn {
        flex: 1;
        height: 42px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.08);
        color: inherit;
        font-size: 13px;
        cursor: pointer;
        user-select: none;
        backdrop-filter: blur(10px);
      }

      .modal-btn:active {
        transform: scale(0.98);
      }

      .modal-btn.primary {
        background: rgba(255, 255, 255, 0.16);
        border-color: rgba(255, 255, 255, 0.2);
        color: inherit;
        font-weight: 650;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="phone" id="root">
        <div class="stage" id="stage">
          <video
            id="player"
            muted
            playsinline
            webkit-playsinline
            preload="metadata"
          ></video>
          <div class="shade"></div>

          <div class="topbar">
            <div class="counter" id="counter">1/10</div>
            <div class="top-right">
              <div class="counter" id="category">治愈陪伴</div>
              <a class="counter persona-entry" id="personaEntry" href="./current.html" aria-label="进入人格页">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8zm0 2c-4.4 0-8 2.3-8 5.2V22h16v-2.8C20 16.3 16.4 14 12 14z"
                    fill="currentColor"
                  />
                </svg>
              </a>
            </div>
          </div>

          <div class="hint" id="hint">点击屏幕可播放/暂停；上下滑切换</div>

          <div class="actions">
            <div>
              <div class="btn like" id="likeBtn" role="button" aria-label="点赞">
                <svg viewBox="0 0 24 24">
                  <path
                    d="M12 21s-7-4.35-9.5-8.28C.9 9.85 2.5 6.5 6 6.5c1.9 0 3.2 1.1 4 2.2.8-1.1 2.1-2.2 4-2.2 3.5 0 5.1 3.35 3.5 6.22C19 16.65 12 21 12 21z"
                  />
                </svg>
              </div>
              <div class="count" id="likeCount"></div>
            </div>
            <div>
              <div class="btn" id="commentBtn" role="button" aria-label="评论">
                <svg viewBox="0 0 24 24">
                  <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z" />
                </svg>
              </div>
              <div class="count" id="commentCount"></div>
            </div>
            <div>
              <div class="btn save" id="saveBtn" role="button" aria-label="收藏">
                <svg viewBox="0 0 24 24">
                  <path d="M6 3h12a1 1 0 0 1 1 1v18l-7-4-7 4V4a1 1 0 0 1 1-1z" />
                </svg>
              </div>
              <div class="count" id="shareCount"></div>
            </div>
            <div>
              <div class="btn" id="shareBtn" role="button" aria-label="分享">
                <svg viewBox="0 0 24 24">
                  <path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7" />
                  <path d="M12 16V3" />
                  <path d="M7 8l5-5 5 5" />
                </svg>
              </div>
              <div class="count" id="shareCount2"></div>
            </div>
          </div>

          <div class="meta">
            <div class="user">
              <div class="avatar"></div>
              <div class="handle" id="handle">@情绪观察者</div>
            </div>
            <p class="caption" id="caption">找到内心的平静时刻</p>
            <div class="tags" id="tags"></div>
          </div>

          <div class="footer">
            <div class="pill"><b>静态版</b><span>双击即开</span></div>
            <div class="pill" id="statusPill"><span id="statusText">就绪</span></div>
          </div>
        </div>

        <div class="modal" id="personaModal" role="dialog" aria-modal="true" aria-hidden="true">
          <div class="modal-card" id="personaModalCard">
            <div class="modal-head">
              <div class="modal-title">人格小卡片</div>
              <div class="modal-badge">10/10</div>
            </div>
            <div class="modal-body">
              <p class="modal-desc">你已刷完本轮 10 条视频。进入我的专属空间，看看你的“当下人格”。</p>
              <div class="modal-persona">
                <div class="kicker" id="personaKicker">—</div>
                <img class="pimg" id="personaImg" alt="" />
                <h3 class="ptitle" id="personaTitle">—</h3>
                <p class="pinsight" id="personaInsight">—</p>
                <p class="pdesc" id="personaDesc">—</p>
              </div>
            </div>
            <div class="modal-actions">
              <button class="modal-btn primary" id="goSpaceBtn" type="button">进入我的专属空间</button>
              <button class="modal-btn" id="ignoreBtn" type="button">暂时忽略</button>
            </div>
          </div>
        </div>

        <div class="cover" id="cover" aria-hidden="false">
          <div class="cover-card">
            <div class="cover-title">今天用哪个 ID 刷出你的潜在人格？</div>
            <p class="cover-sub">输入 ID 后，点赞/收藏/人格历史会与 ID 绑定，下次还能在当日测评与时间轴找到自己。</p>
            <label class="cover-label" for="userIdInput">你的 ID</label>
            <input class="cover-input" id="userIdInput" autocomplete="off" spellcheck="false" />
            <div class="cover-actions">
              <button class="cover-btn primary" id="startBtn" type="button">开始刷视频</button>
              <button class="cover-btn" id="randomBtn" type="button">随机一个 ID</button>
            </div>
            <div class="cover-hint">支持中英文/数字/_/-，最多 20 个字</div>
            <div class="cover-tip" id="coverTip"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        var files = [
          "治愈陪伴-1.mp4",
          "治愈陪伴-2.mp4",
          "深夜情绪-1.mp4",
          "深夜情绪-2.mp4",
          "恋爱情感-1.mp4",
          "恋爱情感-2.mp4",
          "爽感刺激-1.mp4",
          "爽感刺激-2.mp4",
          "理想人生-1.mp4",
          "理想人生-2.mp4",
          "社会现实-1.mp4",
          "社会现实-2.mp4",
          "自我提升-1.mp4",
          "自我提升-2.mp4",
          "情绪鸡血-1.mp4",
          "情绪鸡血-2.mp4",
          "搞笑摆烂-1.mp4",
          "搞笑摆烂-2.mp4",
          "人格玄学-1.mp4",
          "人格玄学-2.mp4",
        ];

        function pickOne(arr) {
          return arr[Math.floor(Math.random() * arr.length)];
        }

        function shuffle(arr) {
          for (var i = arr.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var t = arr[i];
            arr[i] = arr[j];
            arr[j] = t;
          }
          return arr;
        }

        function buildRound(files) {
          var groups = Object.create(null);
          for (var i = 0; i < files.length; i++) {
            var f = files[i];
            var prefix = (f.split("-")[0] || "视频").trim();
            if (!groups[prefix]) groups[prefix] = [];
            groups[prefix].push(f);
          }

          var keys = Object.keys(groups);
          var picked = [];
          for (var k = 0; k < keys.length; k++) {
            picked.push(pickOne(groups[keys[k]]));
          }
          return shuffle(picked);
        }

        function buildRoundFiltered(files, likedMap, savedMap) {
          var groups = Object.create(null);
          for (var i = 0; i < files.length; i++) {
            var f = files[i];
            var prefix = (f.split("-")[0] || "视频").trim();
            if (!groups[prefix]) groups[prefix] = [];
            groups[prefix].push(f);
          }

          var keys = Object.keys(groups);
          var picked = [];

          for (var k = 0; k < keys.length; k++) {
            var list = groups[keys[k]];
            var candidates = [];
            for (var j = 0; j < list.length; j++) {
              var it = list[j];
              if ((likedMap && likedMap[it]) || (savedMap && savedMap[it])) continue;
              candidates.push(it);
            }
            picked.push(pickOne(candidates.length ? candidates : list));
          }

          return shuffle(picked);
        }

        function kFormat(n) {
          if (n >= 10000) return (n / 10000).toFixed(1) + "w";
          if (n >= 1000) return (n / 1000).toFixed(1) + "k";
          return String(n);
        }

        function makeItem(file, i) {
          var parts = file.replace(".mp4", "").split("-");
          var category = parts[0] || "视频";
          var seq = parts[1] || String(i + 1);
          return {
            id: file,
            category: category,
            title: category + " " + seq,
            caption: "“" + category + "” 类型视频 - 第 " + seq + " 条",
            tags: ["#" + category, "#抖音刷视频", "#本地MP4"],
            likes: 8000 + (i % 7) * 2300,
            comments: 200 + (i % 9) * 97,
            shares: 120 + (i % 8) * 61,
            src: "./src/vedio/" + file,
          };
        }

        var stage = document.getElementById("stage");
        var player = document.getElementById("player");
        var actions = document.querySelector(".actions");

        function resetSession() {

        function finalizeCurrentView() {
          if (!started) return;
          var now = Date.now();
          var item = data[idx];
          if (!item) return;

          var dwell = Math.max(0, now - currentViewStartedAt);
          totalDwellMs += dwell;
          ensureCat(item.category).dwellMs += dwell;

          if (playedSince) {
            var w = Math.max(0, now - playedSince);
            totalWatchMs += w;
            ensureCat(item.category).watchMs += w;
            playedSince = 0;
          }
        }

        function enterView() {
          if (!started) return;
          currentViewStartedAt = Date.now();
          var item = data[idx];
          if (!item) return;
          ensureCat(item.category).views += 1;

        function getPeriodByHour(hour) {
          if (hour >= 6 && hour < 12) return "morning";
          if (hour >= 12 && hour < 19) return "afternoon";
          if (hour >= 19 && hour < 24) return "evening";
          return "midnight";
        }

        function pad2(n) {
          return String(n).padStart(2, "0");

        function getDayKey(ts) {
          var d = new Date(ts || Date.now());
          return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate());
        }

        function findPersonaForDayPeriod(store, dayKey, periodKey) {
          if (!store || !Array.isArray(store.history)) return null;
          for (var i = 0; i < store.history.length; i++) {
            var it = store.history[i];
            if (!it || !it.persona) continue;
            if (it.dayKey === dayKey && it.periodKey === periodKey) return it;

        function mean(arr) {
          if (!arr.length) return 0;
          var s = 0;
          for (var i = 0; i < arr.length; i++) s += arr[i];
          return s / arr.length;
        }

        function stdRatio(arr) {
          if (arr.length < 3) return 1;
          var m = mean(arr);
          if (!m) return 1;
          var s = 0;
          for (var i = 0; i < arr.length; i++) s += Math.pow(arr[i] - m, 2);
          var v = Math.sqrt(s / arr.length);
          return v / m;
        }

        function buildRoundInteractions() {
          var likeTotal = 0;
          var saveTotal = 0;
          var likeByCat = Object.create(null);
          var saveByCat = Object.create(null);

          for (var i = 0; i < data.length; i++) {
            var it = data[i];
            if (liked[it.id]) {
              likeTotal += 1;
              likeByCat[it.category] = (likeByCat[it.category] || 0) + 1;
            }
            if (saved[it.id]) {
              saveTotal += 1;
              saveByCat[it.category] = (saveByCat[it.category] || 0) + 1;
            }
          }

          return { likeTotal: likeTotal, saveTotal: saveTotal, likeByCat: likeByCat, saveByCat: saveByCat };
        }

        function buildCategoryMetrics() {
          var ALL = ["治愈陪伴", "深夜情绪", "恋爱情感", "爽感刺激", "理想人生", "社会现实", "自我提升", "情绪鸡血", "搞笑摆烂", "人格玄学"];

          var totalViews = 0;
          for (var i = 0; i < ALL.length; i++) totalViews += (perCat[ALL[i]] && perCat[ALL[i]].views) || 0;
          if (!totalViews) totalViews = data.length;

          var useWatch = totalWatchMs > 1200;
          var primaryTotal = 0;
          var values = [];
          var byCat = Object.create(null);

          for (var i = 0; i < ALL.length; i++) {
            var c = ALL[i];
            var obj = perCat[c] || { watchMs: 0, dwellMs: 0, views: 0 };
            var primary = useWatch ? obj.watchMs : obj.dwellMs;
            primaryTotal += primary;
            values.push(primary);
            byCat[c] = {
              watchMs: obj.watchMs || 0,
              dwellMs: obj.dwellMs || 0,
              views: obj.views || 0,
              primaryMs: primary,
            };
          }

          if (!primaryTotal) primaryTotal = 1;

          var dominantCat = ALL[0];
          var dominantMs = -1;
          for (var i = 0; i < ALL.length; i++) {
            var c = ALL[i];
            if (byCat[c].primaryMs > dominantMs) {
              dominantMs = byCat[c].primaryMs;
              dominantCat = c;
            }
          }

          var shares = [];
          for (var i = 0; i < ALL.length; i++) shares.push(byCat[ALL[i]].primaryMs / primaryTotal);
          var m = mean(shares);
          var s = 0;
          for (var i = 0; i < shares.length; i++) s += Math.pow(shares[i] - m, 2);
          var cv = m ? Math.sqrt(s / shares.length) / m : 0;

          return {
            byCat: byCat,
            dominantCat: dominantCat,
            primaryTotalMs: primaryTotal,
            useWatch: useWatch,
            cv: cv,
            totalViews: totalViews,
          };
        }

        function loveShareFromResult(r) {
          try {
            if (!r || !r.stats || !r.stats.perCat) return 0;
            var by = r.stats.perCat;
            var love = by["恋爱情感"] ? by["恋爱情感"].primaryMs || 0 : 0;
            var total = r.stats.primaryTotalMs;
            if (!total) {
              var keys = Object.keys(by);
              total = 0;
              for (var i = 0; i < keys.length; i++) total += by[keys[i]].primaryMs || 0;
            }
            if (!total) return 0;
            return love / total;
          } catch (e) {
            return 0;
          }
        }

        function decidePersona() {
          var periodKey = getPeriodByHour(new Date().getHours());
          var periodInfo = PERIOD_INFO[periodKey] || PERIOD_INFO.morning;
          var dayKey = getDayKey(Date.now());

          var inter = buildRoundInteractions();
          var metrics = buildCategoryMetrics();

          var avgStaySec = metrics.totalViews ? totalDwellMs / metrics.totalViews / 1000 : 0;
          var avgSwipeSec = swipeIntervals.length ? mean(swipeIntervals) / 1000 : avgStaySec;
          var mech = avgStaySec >= 3 && avgStaySec <= 5 && stdRatio(swipeIntervals) <= 0.22;
          var quick = avgStaySec <= 2 && avgSwipeSec <= 1.8;
          var slow = avgStaySec >= 6.5 || avgSwipeSec >= 4.5;
          var hasRewatch = backSwipeCount > 0;

          function share(cat) {
            return metrics.byCat[cat] ? metrics.byCat[cat].primaryMs / metrics.primaryTotalMs : 0;
          }

          function avgStayCat(cat) {
            var c = metrics.byCat[cat];
            if (!c || !c.views) return 0;
            return c.dwellMs / c.views / 1000;
          }

          var loveShare = share("恋爱情感");
          var loveNotDominant = metrics.dominantCat !== "恋爱情感" && loveShare < 0.22;
          var store = personaKey ? loadJSON(personaKey, null) : null;
          var maxOtherLove = 0;
          if (store && Array.isArray(store.history)) {
            for (var i = 0; i < store.history.length; i++) {
              var h = store.history[i];
              if (!h || h.dayKey !== dayKey || h.periodKey === periodKey) continue;
              var ls = loveShareFromResult(h);
              if (ls > maxOtherLove) maxOtherLove = ls;
            }
          }
          var loveNoticeablyHigher = loveShare >= Math.max(0.26, maxOtherLove + 0.08);

          var personaId = "";

          if (periodKey === "morning") {
            if (metrics.dominantCat === "自我提升" && inter.saveTotal > 0 && avgStaySec >= 5) personaId = "m7";
            else if (metrics.dominantCat === "搞笑摆烂" && inter.likeTotal === 0 && inter.saveTotal === 0 && quick) personaId = "m8";
            else if (metrics.dominantCat === "治愈陪伴" && slow) personaId = "m1";
            else if (metrics.cv < 0.25 && loveNotDominant && avgStaySec <= 2 && inter.likeTotal === 0 && inter.saveTotal === 0 && quick) personaId = "m2";
            else if (metrics.dominantCat === "情绪鸡血" && inter.likeTotal > 0 && avgStayCat("情绪鸡血") >= 3 && avgStayCat("情绪鸡血") <= 4.5) personaId = "m4";
            else if (share("治愈陪伴") >= 0.25 && avgStaySec >= 7 && slow) personaId = "m5";
            else if (metrics.dominantCat === "情绪鸡血" && inter.saveTotal > inter.likeTotal && avgStayCat("情绪鸡血") > 0 && avgStayCat("情绪鸡血") < 3.2) personaId = "m6";
            else if (metrics.cv < 0.28 && mech && inter.likeTotal === 0 && inter.saveTotal === 0) personaId = "m3";
            else personaId = "m3";
          } else if (periodKey === "afternoon") {
            if (metrics.dominantCat === "理想人生" && avgStayCat("理想人生") >= 8) personaId = "n7";
            else if (share("搞笑摆烂") + share("爽感刺激") >= 0.5 && inter.likeTotal === 0 && avgStaySec <= 3 && loveNotDominant) personaId = "n8";
            else if (metrics.dominantCat === "理想人生" && hasRewatch) personaId = "n1";
            else if (metrics.dominantCat === "搞笑摆烂" && avgSwipeSec <= 2.2) personaId = "n2";
            else if (share("理想人生") >= 0.22 && inter.saveByCat["理想人生"] >= 1 && slow) personaId = "n3";
            else if (avgStaySec <= 2.6 && inter.likeTotal === 0 && inter.saveTotal === 0) personaId = "n4";
            else if (metrics.dominantCat === "治愈陪伴" && inter.likeByCat["治愈陪伴"] >= 1 && avgSwipeSec >= 2.8) personaId = "n6";
            else personaId = "n5";
          } else if (periodKey === "evening") {
            if (share("自我提升") > 0 && share("深夜情绪") >= 0.18 && share("人格玄学") >= 0.18 && avgStaySec >= 7) personaId = "e7";
            else if (metrics.dominantCat === "爽感刺激" && inter.saveTotal >= 1 && slow) personaId = "e8";
            else if (metrics.dominantCat === "爽感刺激" && inter.likeTotal >= 1) personaId = "e3";
            else if (inter.saveTotal >= 2 && avgStaySec >= 8) personaId = "e2";
            else if (metrics.dominantCat === "治愈陪伴" && (avgStaySec >= 5 || slow)) personaId = "e5";
            else if (share("理想人生") + share("人格玄学") >= 0.45) personaId = "e6";
            else if (totalDwellMs / 1000 >= metrics.totalViews * 4 && inter.likeTotal >= 1 && loveNoticeablyHigher) personaId = "e4";
            else personaId = "e1";
          } else {
            if (share("深夜情绪") + share("人格玄学") >= 0.55 && avgStaySec >= 8) personaId = "l7";
            else if (metrics.dominantCat === "治愈陪伴" && inter.likeTotal === 0 && inter.saveTotal === 0 && avgSwipeSec >= 5 && avgStayCat("治愈陪伴") >= 8) personaId = "l8";
            else if (metrics.dominantCat === "深夜情绪" && avgStayCat("深夜情绪") >= 10 && hasRewatch) personaId = "l1";
            else if (metrics.dominantCat === "人格玄学" && avgStayCat("人格玄学") >= 8 && avgSwipeSec >= 5) personaId = "l2";
            else if (share("自我提升") + share("情绪鸡血") >= 0.35 && inter.saveTotal >= 1 && avgStaySec >= 6) personaId = "l3";
            else if (avgStaySec > 6 && hasRewatch) personaId = "l5";
            else if (share("治愈陪伴") >= 0.25 && inter.likeTotal === 0 && inter.saveTotal === 0 && avgSwipeSec >= 4) personaId = "l6";
            else personaId = "l4";
          }

          var persona = PERSONAS[personaId] || PERSONAS.m3;

          var summary = "本轮主要偏好：" + metrics.dominantCat + " · 平均停留 " + avgStaySec.toFixed(1) + "s";
          var personaImage = getPersonaImage(persona);

          return {
            ts: Date.now(),
            dayKey: dayKey,
            periodKey: periodKey,
            periodLabel: periodInfo.label,
            periodRange: periodInfo.range,
            persona: persona,
            personaImage: personaImage,
            summary: summary,
            stats: {
              avgStaySec: avgStaySec,
              avgSwipeSec: avgSwipeSec,
              cv: metrics.cv,
              loveShare: loveShare,
              likeTotal: inter.likeTotal,
              saveTotal: inter.saveTotal,
              dominantCat: metrics.dominantCat,
              perCat: metrics.byCat,
              primaryTotalMs: metrics.primaryTotalMs,
              backSwipeCount: backSwipeCount,
              sessionSec: (Date.now() - sessionStartedAt) / 1000,
            },
          };
        }

        function applyPersonaCard(result) {
          var periodKey = result.periodKey;
          var periodInfo = PERIOD_INFO[periodKey] || PERIOD_INFO.morning;
          var persona = result.persona;

          if (personaKicker) personaKicker.textContent = periodInfo.label + " · " + periodInfo.range + " · " + persona.tag;
          if (personaTitle) personaTitle.textContent = persona.title;
          if (personaInsight) personaInsight.textContent = persona.insight;
          if (personaDesc) personaDesc.textContent = persona.desc;

          if (personaImg) {
            personaImg.style.display = "none";
            personaImg.onload = function () {
              personaImg.style.display = "block";
            };
            personaImg.onerror = function () {
              personaImg.style.display = "none";
            };
            personaImg.alt = persona.title;
            personaImg.src = encodeURI(getPersonaImage(persona));
          }

          if (personaModalCard) {
            personaModalCard.style.background = periodInfo.gradient;
            personaModalCard.style.color = periodInfo.text;
          }
        }

        function setStatus(t) {
          statusText.textContent = t;
        }

        function showHint() {
          hint.classList.add("on");
          window.clearTimeout(showHint._t);
          showHint._t = window.setTimeout(function () {
            hint.classList.remove("on");
          }, 1400);
        }

        function setTags(tags) {
          while (tagsEl.firstChild) tagsEl.removeChild(tagsEl.firstChild);
          for (var i = 0; i < tags.length; i++) {
            var span = document.createElement("span");
            span.className = "tag";
            span.textContent = tags[i];
            tagsEl.appendChild(span);
          }
        }

        function pauseReset() {
          try {
            player.pause();
            player.currentTime = 0;
          } catch (e) {}
        }

        function playSafe() {
          var p = player.play();
          if (p && p.catch) {
            p.catch(function () {
              showHint();
              setStatus("需要点击后播放");
            });
          }
        }

        function openModal() {
          if (!started) return;
          if (modalOpen) return;
          finalizeCurrentView();
          var store = loadJSON(personaKey, { latest: null, history: [] });
          if (!store || typeof store !== "object") store = { latest: null, history: [] };
          if (!Array.isArray(store.history)) store.history = [];

          var nowDay = getDayKey(Date.now());
          var nowPeriod = getPeriodByHour(new Date().getHours());
          var existed = findPersonaForDayPeriod(store, nowDay, nowPeriod);

          var result = existed ? existed : decidePersona();
          if (!existed) {
            store.latest = result;
            store.history.unshift(result);
            store.history = store.history.slice(0, 60);
            saveJSON(personaKey, store);
          }

          applyPersonaCard(result);
          updatePersonaEntry();
          modalOpen = true;
          personaModal.classList.add("on");
          personaModal.setAttribute("aria-hidden", "false");
          try {
            player.pause();
          } catch (e) {}
        }

        function closeModal() {
          if (!modalOpen) return;
          modalOpen = false;
          personaModal.classList.remove("on");
          personaModal.setAttribute("aria-hidden", "true");
          playSafe();
        }

        function applyInteractions(item) {
          likeBtn.classList.toggle("on", !!liked[item.id]);
          saveBtn.classList.toggle("on", !!saved[item.id]);
          if (commentBtn) commentBtn.classList.toggle("on", !!commented[item.id]);
          if (shareBtn) shareBtn.classList.toggle("on", !!shared[item.id]);

          likeCount.textContent = liked[item.id] ? "1" : "";
          commentCount.textContent = commented[item.id] ? "1" : "";
          shareCount.textContent = saved[item.id] ? "1" : "";
          shareCount2.textContent = shared[item.id] ? "1" : "";
        }

        function applyItem(item) {
          counter.textContent = idx + 1 + "/" + data.length;
          categoryEl.textContent = item.category;
          captionEl.textContent = item.caption;
          setTags(item.tags);
          applyInteractions(item);

          setStatus("加载中…");
          pauseReset();
          player.src = encodeURI(item.src);
          player.load();
          playSafe();
        }

        function go(next) {
          if (!started) return;
          if (next < 0 || next >= data.length) return;
          finalizeCurrentView();
          idx = next;
          stage.style.transition = "transform 180ms ease";
          stage.style.transform = "translateY(0)";
          applyItem(data[idx]);
          enterView();
        }

        function noteSwipe(dir) {
          var now = Date.now();
          if (lastSwipeAt) swipeIntervals.push(now - lastSwipeAt);
          lastSwipeAt = now;
          if (dir === "down") backSwipeCount += 1;
        }

        function swipe(dir) {
          if (!started) return;
          if (modalOpen) return;
          if (dir === "up") {
            if (idx >= data.length - 1) {
              noteSwipe("up");
              openModal();
              return;
            }
            noteSwipe("up");
            go(idx + 1);
          } else {
            if (idx <= 0) return;
            noteSwipe("down");
            go(idx - 1);
          }
        }

        player.addEventListener("loadedmetadata", function () {
          setStatus("就绪");
        });

        player.addEventListener("error", function () {
          setStatus("视频加载失败");
          showHint();
        });

        stage.addEventListener("click", function (e) {
          if (!started) return;
          if (modalOpen) return;
          if (actions && actions.contains(e.target)) return;
          if (player.paused) {
            playSafe();
          } else {
            player.pause();
          }
        });

        likeBtn.addEventListener("click", function () {
          if (!started) return;
          var id = data[idx].id;
          liked[id] = !liked[id];
          if (liked[id]) historyLiked[id] = true;
          else delete historyLiked[id];
          saveJSON(interactionsKey, { liked: historyLiked, saved: historySaved });
          applyInteractions(data[idx]);
        });

        saveBtn.addEventListener("click", function () {
          if (!started) return;
          var id = data[idx].id;
          saved[id] = !saved[id];
          if (saved[id]) historySaved[id] = true;
          else delete historySaved[id];
          saveJSON(interactionsKey, { liked: historyLiked, saved: historySaved });
          applyInteractions(data[idx]);
        });

        if (commentBtn) {
          commentBtn.addEventListener("click", function () {
            if (!started) return;
            var id = data[idx].id;
            commented[id] = !commented[id];
            applyInteractions(data[idx]);
          });
        }

        if (shareBtn) {
          shareBtn.addEventListener("click", function () {
            if (!started) return;
            var id = data[idx].id;
            shared[id] = !shared[id];
            applyInteractions(data[idx]);
          });
        }

        personaModal.addEventListener("click", function (e) {
          if (e.target === personaModal) closeModal();
        });

        personaModalCard.addEventListener("click", function (e) {
          e.stopPropagation();
        });

        goSpaceBtn.addEventListener("click", function () {
          try {
            sessionStorage.setItem(AUTO_START_RETURN, "1");
          } catch (e) {}
          window.location.href = "./current.html";
        });

        if (personaEntry) {
          personaEntry.addEventListener("click", function (e) {
            try {
              sessionStorage.setItem(AUTO_START_RETURN, "1");
            } catch (err) {}
            if (e && e.preventDefault) e.preventDefault();
            window.location.href = "./current.html";
          });
        }

        ignoreBtn.addEventListener("click", function () {
          closeModal();
        });

        stage.addEventListener("touchstart", function (e) {
          if (!started) return;
          touchStartY = e.touches[0].clientY;
          touchEndY = 0;
        });

        stage.addEventListener("touchmove", function (e) {
          if (!started) return;
          touchEndY = e.touches[0].clientY;
        });

        stage.addEventListener("touchend", function () {
          if (!started) return;
          if (!touchStartY || !touchEndY) return;
          var d = touchStartY - touchEndY;
          if (d > 50) swipe("up");
          if (d < -50) swipe("down");
        });

        stage.addEventListener("wheel", function (e) {
          if (!started) return;
          if (e.deltaY > 0) swipe("up");
          if (e.deltaY < 0) swipe("down");
        });

        window.addEventListener("keydown", function (e) {
          if (!started) return;
          if (e.key === "ArrowDown") swipe("up");
          if (e.key === "ArrowUp") swipe("down");
        });

        function showCoverTip(t) {
          if (!coverTip) return;
          coverTip.textContent = t || "";
        }

        function showCover() {
          if (!cover) return;
          cover.classList.remove("off");
          cover.setAttribute("aria-hidden", "false");
          showCoverTip("");
          try {
            player.pause();
          } catch (e) {}
          started = false;
          modalOpen = false;
          personaModal.classList.remove("on");
          personaModal.setAttribute("aria-hidden", "true");
        }

        function hideCover() {
          if (!cover) return;
          cover.classList.add("off");
          cover.setAttribute("aria-hidden", "true");
        }

        function startForUser(userId) {
          activeUserId = userId;
          interactionsKey = keyFor(BASE_INTERACTIONS, userId);
          personaKey = keyFor(BASE_PERSONA, userId);

          var persisted = loadJSON(interactionsKey, { liked: {}, saved: {} });
          historyLiked = (persisted && persisted.liked) || Object.create(null);
          historySaved = (persisted && persisted.saved) || Object.create(null);
          liked = Object.create(null);
          saved = Object.create(null);

          var roundFiles = buildRoundFiltered(files, historyLiked, historySaved);
          data = roundFiles.map(makeItem);
          idx = 0;
          resetSession();
          hideCover();
          started = true;
          applyItem(data[idx]);
          enterView();
          updatePersonaEntry();
          showHint();
        }

        if (randomBtn) {
          randomBtn.addEventListener("click", function () {
            if (!userIdInput) return;
            userIdInput.value = randomUserId();
            showCoverTip("");
            userIdInput.focus();
          });
        }

        if (startBtn) {
          startBtn.addEventListener("click", function () {
            var id = normalizeUserId(userIdInput ? userIdInput.value : "");
            if (!id) {
              showCoverTip("ID 格式不对：支持中英文/数字/_/-，最多 20 个字");
              return;
            }
            saveActiveUserId(id);
            migrateLegacyIfNeeded(id);
            startForUser(id);
          });
        }

        if (userIdInput) {
          userIdInput.addEventListener("keydown", function (e) {
            if (e.key === "Enter" && startBtn) startBtn.click();
          });
        }

        if (userIdInput) userIdInput.value = loadActiveUserId();
        (function () {
          var id = loadActiveUserId();
          var auto = false;
          try {
            auto = sessionStorage.getItem(AUTO_START_RETURN) === "1";
          } catch (e) {}
          if (auto && id) {
            autoStartPending = true;
            migrateLegacyIfNeeded(id);
            startForUser(id);
            return;
          }
          showCover();
        })();

        window.addEventListener("pageshow", function (e) {
          if (e && e.persisted) {
            window.location.reload();
            return;
          }
          try {
            var nav = performance.getEntriesByType && performance.getEntriesByType("navigation")[0];
            if (nav && nav.type === "back_forward") {
              window.location.reload();
              return;
            }
          } catch (err) {}
          if (autoStartPending) {
            autoStartPending = false;
            try {
              sessionStorage.removeItem(AUTO_START_RETURN);
            } catch (e2) {}
          }
        });
      })();
    </script>
  </body>
</html>
